version: '3'

services:
  news:
    build: .
    container_name: rss-reader
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./tmpl:/app/tmpl
      - ./static:/app/static
    env_file:
      - .env
    environment:
      - DB_PATH=/data/news.db
      - PORT=8080
      - TZ=Asia/Shanghai
    restart: unless-stopped
