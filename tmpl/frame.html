<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Webpage</title>

    <meta name="title" content="The Webpage">
    <meta name="description" content="The RSS Reader for the 20th Century">
    <meta property="og:type" content="website">
    <meta property="og:url" content="/">
    <meta property="og:title" content="The Webpage">
    <meta property="og:description" content="The RSS Reader for the 20th Century">
    <meta property="og:image" content="/static/images/preview.png">
    <meta name="viewport" content="width=device-width, initial-scale=0.86, maximum-scale=5.0, minimum-scale=0.86">

    <link rel="preload" href="/static/fonts/OldEnglishFive-axyVg.woff" as="font" type="font/woff" crossorigin>
    <link rel="stylesheet" href="/static/normalize.css" type="text/css"/>
    <link rel="stylesheet" href="/static/bulma.min.css" type="text/css"/>
    <link rel="stylesheet" href="/static/main.css?cb=20201114" type="text/css"/>

    <script src="/static/turbolinks.js" type="text/javascript"></script>
    <script src="/static/shave.js" type="text/javascript"></script>
    
    <script>
        if (
            localStorage.getItem("color-mode") === "dark" ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches &&
                !localStorage.getItem("color-mode"))
        ) {
            document.documentElement.setAttribute("color-mode", "dark");
        } else {
            document.documentElement.setAttribute("color-mode", "light");
        }
    </script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var lazyloadImages;
            if ("IntersectionObserver" in window) {
                lazyloadImages = document.querySelectorAll(".lazy");
                var imageObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            var image = entry.target;
                            image.src = image.dataset.src;
                            image.classList.remove("lazy");
                            imageObserver.unobserve(image);
                        }
                    });
                });
                lazyloadImages.forEach(function(image) {
                    imageObserver.observe(image);
                });
            } else {
                var lazyloadThrottleTimeout;
                lazyloadImages = document.querySelectorAll(".lazy");
                function lazyload () {
                    if(lazyloadThrottleTimeout) {
                        clearTimeout(lazyloadThrottleTimeout);
                    }
                    lazyloadThrottleTimeout = setTimeout(function() {
                        var scrollTop = window.pageYOffset;
                        lazyloadImages.forEach(function(img) {
                            if(img.offsetTop < (window.innerHeight + scrollTop)) {
                                img.src = img.dataset.src;
                                img.classList.remove('lazy');
                            }
                        });
                        if(lazyloadImages.length == 0) {
                            document.removeEventListener("scroll", lazyload);
                            window.removeEventListener("resize", lazyload);
                            window.removeEventListener("orientationChange", lazyload);
                        }
                    }, 20);
                }
                document.addEventListener("scroll", lazyload);
                window.addEventListener("resize", lazyload);
                window.addEventListener("orientationChange", lazyload);
            }
        })
    </script>

<script>
    window.trimArticle = function(id) {
        var el = document.getElementById(id + "-text");
        var container = document.getElementById(id);
        if (!el || !container) return;

        var style = getComputedStyle(container);
        if (style.maxHeight === "none") return;
        
        // 1. 计算可用总高度
        var maxHeight = parseFloat(style.maxHeight);
        var link = document.getElementById(id + "-link");
        var linkStyle = getComputedStyle(link);
        
        var linkTotalHeight = link ? (link.offsetHeight + parseFloat(linkStyle.marginTop) + parseFloat(linkStyle.marginBottom)) : 0;
        var containerMargin = parseFloat(style.marginTop) + parseFloat(style.marginBottom);
        
        var availableHeight = maxHeight - linkTotalHeight - containerMargin - 20;
        if (availableHeight < 45) availableHeight = 45;

        // 2. 测量文字实际高度
        var fullText = el.textContent.replace(/\.+$/, '').trim();
        if (!fullText) return;
        
        el.innerHTML = fullText; 
        el.style.display = "block"; 
        var actualTextHeight = el.scrollHeight;

        // 3. 计算留白间隙
        var gap = availableHeight - actualTextHeight;

        // 执行标准中文截断
        shave("#" + el.id, availableHeight, { spaces: false });
    };
</script>
</head>
<body>
<svg style="display: none;">
    <symbol viewBox="0 0 24 24" id="moon">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </symbol>
    <symbol viewBox="0 0 24 24" id="sun">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </symbol>
</svg>

<div class="container is-fluid" style="max-width: 1200px !important; padding-left: 20px !important; padding-right: 20px !important;">
    
    <div data-turbolinks-permanent="" class="level" style="align-items: baseline; margin-left: 1rem; margin-right: 1rem; margin-bottom: 1rem">
        <div class="is-hidden-mobile" style="margin-right: 2rem; width: 100%; display: flex; flex-direction: row; justify-content: space-between; flex-wrap: nowrap">
            {{range .Categories}}
                <a href="/?cat={{.}}">{{.}}</a>
            {{end}}
        </div>
        
        <div class="level-right" style="margin-top: 1rem;">
            <div style="width: 100%; display: flex; flex-direction: row; flex-wrap: nowrap">
                <button class="style-button" aria-label="Open style menu"> Aa </button>
                <div class="style-config" style="display:none">
                    <div style="display: flex; width: 100%; margin-bottom: 10px; justify-content: space-between;">
                        <button class="color-mode__btn" aria-label="Toggle light mode">
                            <svg onclick="light()"><title>Light Mode</title><use href="#sun"></use></svg>
                        </button>
                        <button class="color-mode__btn" aria-label="Toggle dark mode">
                            <svg onclick="dark()"><title>Dark Mode</title><use href="#moon"></use></svg>
                        </button>
                    </div>
                    <div style="display: flex; margin-bottom: 10px; align-items: baseline;">
                        <button class="color-mode__btn" onclick="regular()"><span class="regular">A</span></button>
                        <button class="color-mode__btn" onclick="big()"><span class="big">A</span></button>
                    </div>
                    <button class="color-mode__btn sans" onclick="sans()"> Sans </button>
                    <button class="color-mode__btn serif" onclick="serif()"> Serif </button>
                </div>
                <script>
                    var toggleStyle = document.querySelector(".style-button");
                    toggleStyle.addEventListener("click", ev => {
                        const e = document.querySelector(".style-config")
                        if (e.style.display === 'none') {
                            e.style.display = 'flex'
                        } else {
                            e.style.display = 'none'
                        }
                    });
                </script>
            </div>
        </div>
    </div>

    <div class="level" style="margin-top:0rem; align-items: flex-end">
        <nav class="level" style="overflow: hidden; width: 100%; align-items: flex-end; margin-bottom: 1rem;">
            <div class="level-left title-container">
                <a data-turbolinks-action="restore" href="/"><h1>The Webpage</h1></a>
            </div>
            <div class="level-left is-hidden-mobile is-flex" style="align-items: baseline;">
                <form action="/search" method="get" style="margin-right: 1em;">
                    <input class="text-input" type="textbox" name="q" value="Search" onfocus="if(this.value==='Search') {this.value=''}" onblur="if(this.value==='') {this.value='Search'}">
                </form>
            </div>
        </nav>
    </div>

    <div class="bar level">
        <div class="level-left">
            <div class="level-item" style="display:none;">
                {{.ID}}
            </div>
        </div>
        <div class="level-right">
            <div class="level-item">
                {{.Date}}
            </div>
        </div>
    </div>

    {{ template "content" . }}

</div>

<script src="/static/darkmode.js" type="text/javascript"></script>

</body>
</html>
